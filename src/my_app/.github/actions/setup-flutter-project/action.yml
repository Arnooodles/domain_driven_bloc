name: "Setup Flutter Project"
description: "Checks out the repository, gets the Flutter SDK version from FVM config, installs Flutter, installs dependencies, and runs code generation."
runs:
  using: "composite"
  steps:
    - name: 📚 Git Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ Get Flutter SDK version from fvm_config.json
      uses: kuhnroyal/flutter-fvm-config-action@v3
      with:
        path: .fvm/fvm_config.json

    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2.16.0
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: 📦 Install Dependencies
      run: flutter pub get --no-example
      shell: bash

    - name: ⚙️ Run Code Generation
      run: |
        dart run slang
        dart run build_runner build --delete-conflicting-outputs
      shell: bash
