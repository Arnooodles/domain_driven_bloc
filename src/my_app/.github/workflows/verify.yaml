name: verify

on: [push]

concurrency:
  group: "${{ github.ref_name }}"
  cancel-in-progress: true
jobs:
  verify-semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    runs-on: "ubuntu-latest"

    steps:
      - name: ⚙️ Setup Project
        uses: ./.github/actions/setup-flutter-project

      - name: ✨ Check Formatting
        run: |
          dart format lib test

      - name: 🕵️ Analyze
        run: |
          flutter analyze lib test
          dart analyze lib test

      - name: 🧪 Run Tests
        run: flutter test --dart-define=CI=true --coverage --no-pub --test-randomize-ordering-seed random || test_res=1

      - name: 📤 Upload Failed Goldens
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: goldens-failures
          path: test/widget/**/failures

      - name: 📊 Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: 📃 Generate LCOV Report
        run: |
          lcov --ignore-errors unused --remove  coverage/lcov.info  'lib/app/*' 'lib/main.dart' '*.g.dart'  '*.freezed.dart' '*.dto.dart' '*.config.dart' '*.chopper.dart' '*_screen.dart' '*_webview.dart' '**/wrappers/*.dart' '**/service/*' '**/entity/*' '**/dto/*' -o coverage/lcov.info
          genhtml coverage/lcov.info -o coverage/

      - name: 📉 Check Code Coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: ./coverage/lcov.info
          min_coverage: 80
